name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "lumine-rust"
          cache-targets: false
          workspaces: "src-tauri"

      - name: Install Tauri system deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm run test

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets --all-features

      - name: Rust fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
        continue-on-error: true

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all

      - name: Frontend build
        run: npm run build