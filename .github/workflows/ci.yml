name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "lumine-rust"
          cache-targets: false

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm run test

      - name: Rust fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check || true
        continue-on-error: true

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings || true
        continue-on-error: true

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all || true
        continue-on-error: true

      - name: Frontend build
        run: npm run build